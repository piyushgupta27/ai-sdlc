name: secret-scan (platform)

# Reusable workflow — platform-owned, SHA-pinned secret scanning.
# ai-sdlc ships this; repos consume it via sdlc onboard scaffold.
#
# External call (testbeds, via onboard scaffold):
#   uses: piyushgupta27/ai-sdlc/.github/workflows/secret-scan-reusable.yml@main
#
# See ARCHITECTURE.md for design.

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  secret-scan:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
