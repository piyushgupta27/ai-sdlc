name: blast-radius (platform)

# Reusable workflow — platform-owned, hardened Red zone enforcement.
# ai-sdlc ships this; repos consume it instead of deriving their own logic.
#
# Internal call (ai-sdlc itself):
#   uses: ./.github/workflows/blast-radius-reusable.yml
#
# External call (testbeds, via onboard scaffold):
#   uses: piyushgupta27/ai-sdlc/.github/workflows/blast-radius-reusable.yml@main
#
# Key hardening over per-repo LLM-generated versions (see ai-sdlc#83):
#   - NUL-delimited diff (git -c core.quotepath=false diff -z) prevents the
#     quotepath bypass: git's default core.quotepath=true emits non-ASCII filenames
#     as octal-escaped quoted strings ("private/leak-\303\251.json"), which fail
#     case glob matching and let Red zone files escape undetected.
#   - IFS= read -r -d '' loop eliminates word-splitting on spaces in filenames.
#   - Three-dot diff (origin/$BASE_REF...HEAD) avoids base-drift false positives.
#   - Embedded CLAUDE.md parsing (awk): no dependency on per-repo hook scripts.
#
# Setup required once per consumer repo (human):
#   1. GitHub Settings → Environments → New environment → "red-zone-gate"
#      Required reviewers: <repo maintainer>
#   2. Branch protection: add "require MANAGER approval" to required status checks
#      (so red-zone PRs cannot merge until the environment gate is approved).
#
# See ARCHITECTURE.md §7.1 for the three-layer enforcement design.

on:
  workflow_call:
    inputs:
      base_ref:
        description: 'Base branch to diff against (e.g. main)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  detect:
    name: red zone detection
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      touched_red_zone: ${{ steps.detect.outputs.touched_red_zone }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Red zone files in PR
        id: detect
        run: |
          set -euo pipefail
          TOUCHED="false"
          BASE_REF="${{ inputs.base_ref }}"
          git fetch origin "$BASE_REF" --depth=1

          # Parse Red zone glob patterns from CLAUDE.md (Tier 0 + Tier 1).
          # awk extracts "- path" bullets under "### Tier 0" and "### Tier 1" sections,
          # strips trailing comments and slashes so patterns work in case matching.
          RED_ZONE=$(awk '
            /^### Tier 0/ { t=1; next }
            /^### Tier 1/ { t=1; next }
            /^### Tier [234]/ { t=0; next }
            /^## / { t=0; next }
            t && /^- / {
              sub(/^- /, "")
              sub(/[ \t]+#.*$/, "")
              sub(/\/$/, "")
              print
            }
          ' CLAUDE.md)

          if [ -z "$RED_ZONE" ]; then
            echo "No Red zone declared in CLAUDE.md — nothing to check."
            echo "touched_red_zone=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          is_red_zone() {
            local f="$1"
            while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              case "$f" in
                "$pattern" | "$pattern"/*) return 0 ;;
              esac
            done <<< "$RED_ZONE"
            return 1
          }

          # NUL-delimited, quotepath-safe enumeration of changed files.
          # Eliminates the bypass where git's default core.quotepath=true emits
          # non-ASCII filenames as octal-escaped quoted strings that fail glob
          # matching. IFS= read -r -d '' handles spaces and special characters.
          while IFS= read -r -d '' f; do
            [ -f "$f" ] || continue
            if is_red_zone "$f"; then
              echo "::warning file=$f::Red zone file touched — MANAGER approval required"
              TOUCHED="true"
            fi
          done < <(git -c core.quotepath=false diff --name-only -z "origin/$BASE_REF...HEAD")

          echo "touched_red_zone=$TOUCHED" >> "$GITHUB_OUTPUT"

          if [ "$TOUCHED" = "true" ]; then
            echo "::group::Red zone files detected"
            echo "One or more changed files are in Tier 0 / Tier 1 Red zone."
            echo "GitHub will pause the 'require MANAGER approval' job and notify the repo maintainer."
            echo "The MANAGER must click Approve in the GitHub UI to proceed."
            echo "::endgroup::"
          fi

  require-manager-approval:
    name: require MANAGER approval
    needs: detect
    if: needs.detect.outputs.touched_red_zone == 'true'
    runs-on: ubuntu-latest
    environment: red-zone-gate
    steps:
      - name: Red zone approved by MANAGER
        run: |
          echo "MANAGER approved this red-zone PR via GitHub Environment gate."
          echo "Approval is on record in the GitHub deployment history for this PR."
