name: blast-radius

# ⚠️ TIER 0 — Red zone file. See CLAUDE.md.
#
# Layer 3 of three-layer Red zone enforcement for ai-sdlc itself.
# Delegates to the platform-owned reusable workflow that contains the hardened
# detection logic (quotepath-safe NUL-delimited diff, embedded CLAUDE.md parsing).
#
# Testbeds use the same reusable workflow via:
#   uses: piyushgupta27/ai-sdlc/.github/workflows/blast-radius-reusable.yml@main
# (scaffolded by `sdlc onboard` — see meta/templates/blast-radius-consumer.yml)
#
# See .github/workflows/blast-radius-reusable.yml for the canonical mechanism.
# See ARCHITECTURE.md §7.1 for the full three-layer design.
#
# Setup required (one-time, human):
#   GitHub repo Settings → Environments → New environment → "red-zone-gate"
#   Required reviewers: @piyushgupta27
#   Branch protection: add "require MANAGER approval" to required status checks.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  blast-radius:
    uses: ./.github/workflows/blast-radius-reusable.yml
    with:
      base_ref: ${{ github.event.pull_request.base.ref }}
