name: blast-radius

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

# Layer 3 of three-layer enforcement.
#
# Logic:
#   1. List files changed in this PR (vs base branch)
#   2. Run tools/check-blast-radius.sh against each one
#   3. If any file is in Red zone, set touched_red_zone=true
#   4. The require-manager-approval job gates on that output.
#      It declares `environment: red-zone-gate`, which pauses execution
#      and notifies @piyushgupta27 — only his Approve click in the GitHub
#      UI resumes the job. No CLI command or label can substitute.
#
# Setup required (one-time, human):
#   GitHub repo Settings → Environments → New environment → "red-zone-gate"
#   Required reviewers: @piyushgupta27
#
# Branch protection (required status checks): add "require MANAGER approval"
#   to the required checks list so red-zone PRs cannot merge until approved.
#   Non-red-zone PRs skip this job (counted as success by GitHub).
#
# See ARCHITECTURE.md §7.1.3 for the spec.

jobs:
  check:
    name: red zone detection
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      touched_red_zone: ${{ steps.detect.outputs.touched_red_zone }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Red zone files in PR
        id: detect
        run: |
          set -euo pipefail
          TOUCHED="false"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch origin "$BASE_REF" --depth=1
          CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")

          if [ -z "$CHANGED" ]; then
            echo "No changed files; nothing to check."
            echo "touched_red_zone=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for f in $CHANGED; do
            # Skip deleted files (no path to check)
            [ -f "$f" ] || continue
            if ! ./tools/check-blast-radius.sh "$f"; then
              echo "::warning file=$f::Red zone file touched — MANAGER approval required"
              TOUCHED="true"
            fi
          done

          echo "touched_red_zone=$TOUCHED" >> "$GITHUB_OUTPUT"

          if [ "$TOUCHED" = "true" ]; then
            echo "::group::Red zone files detected"
            echo "One or more changed files are in Tier 0 / Tier 1 Red zone."
            echo "GitHub will pause the 'require MANAGER approval' job and notify @piyushgupta27."
            echo "The MANAGER must click Approve in the GitHub UI to proceed."
            echo "::endgroup::"
          fi

  require-manager-approval:
    name: require MANAGER approval
    needs: check
    if: needs.check.outputs.touched_red_zone == 'true'
    runs-on: ubuntu-latest
    environment: red-zone-gate
    steps:
      - name: Red zone approved by MANAGER
        run: |
          echo "MANAGER approved this red-zone PR via GitHub Environment gate."
          echo "Approval is on record in the GitHub deployment history for this PR."
