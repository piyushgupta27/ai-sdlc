name: blast-radius

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

# Layer 3 of three-layer enforcement.
#
# Logic:
#   1. List files changed in this PR (vs base branch)
#   2. Run tools/check-blast-radius.sh against each one
#   3. If any file is in Red zone, the script exits 1 → workflow fails
#   4. Red zone PRs additionally require the `hitl-approved-tier-0` or
#      `hitl-approved-tier-1` label, applied by the dashboard when the user
#      signs the HITL request. Branch protection prevents manual label edits.
#
# See ARCHITECTURE.md §7.1.3 for the spec.

jobs:
  check:
    name: red zone enforcement
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      touched_red_zone: ${{ steps.detect.outputs.touched_red_zone }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Red zone files in PR
        id: detect
        run: |
          set -euo pipefail
          # Without an approval token set, the script blocks any Red zone touch.
          # If ANY changed file fails, the whole job fails.
          TOUCHED="false"
          # Compare against the PR's base (e.g. origin/main).
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch origin "$BASE_REF" --depth=1
          CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")

          if [ -z "$CHANGED" ]; then
            echo "No changed files; nothing to check."
            echo "touched_red_zone=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for f in $CHANGED; do
            # Skip deleted files (no path to check)
            [ -f "$f" ] || continue
            if ! ./tools/check-blast-radius.sh "$f"; then
              echo "::warning file=$f::Red zone file touched without approval token (CI-side)"
              TOUCHED="true"
            fi
          done

          echo "touched_red_zone=$TOUCHED" >> "$GITHUB_OUTPUT"

          if [ "$TOUCHED" = "true" ]; then
            echo "::group::Red zone files detected"
            echo "One or more changed files are in Tier 0 / Tier 1 Red zone."
            echo "This PR requires the 'hitl-approved-tier-0' or 'hitl-approved-tier-1' label."
            echo "The label is applied by the ai-sdlc dashboard when the HITL G3 gate is signed."
            echo "::endgroup::"
          fi

      - name: Require HITL approval label
        if: steps.detect.outputs.touched_red_zone == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map((l) => l.name)
            const hasTier0 = labels.includes('hitl-approved-tier-0')
            const hasTier1 = labels.includes('hitl-approved-tier-1')
            if (!hasTier0 && !hasTier1) {
              core.setFailed(
                'Red zone PR requires the hitl-approved-tier-0 or hitl-approved-tier-1 label. ' +
                'These labels are applied by the ai-sdlc dashboard when the HITL G3 gate is signed. ' +
                'See https://github.com/piyushgupta27/ai-sdlc/blob/main/HITL.md#g3-demo-gate'
              )
            } else {
              core.info(`Red zone approved via label: ${hasTier0 ? 'hitl-approved-tier-0' : 'hitl-approved-tier-1'}`)
            }
