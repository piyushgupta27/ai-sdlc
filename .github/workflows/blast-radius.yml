name: blast-radius

on:
  pull_request:
    branches: [main]
    # Include labeled/unlabeled so applying the `manager-approved` sign-off
    # re-runs this gate (default types don't fire on label changes).
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

# Layer 3 of three-layer enforcement.
#
# Logic:
#   1. List files changed in this PR (vs base branch)
#   2. Run tools/check-blast-radius.sh against each one
#   3. If any file is in Red zone, the script exits 1 → workflow fails
#   4. Red zone PRs additionally require the `manager-approved` label — the
#      MANAGER's explicit sign-off (the PR's tier:N label already records
#      severity). Branch protection prevents unauthorized label edits.
#
# See ARCHITECTURE.md §7.1.3 for the spec.

jobs:
  check:
    name: red zone enforcement
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      touched_red_zone: ${{ steps.detect.outputs.touched_red_zone }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Red zone files in PR
        id: detect
        run: |
          set -euo pipefail
          # Without an approval token set, the script blocks any Red zone touch.
          # If ANY changed file fails, the whole job fails.
          TOUCHED="false"
          # Compare against the PR's base (e.g. origin/main).
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch origin "$BASE_REF" --depth=1
          CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")

          if [ -z "$CHANGED" ]; then
            echo "No changed files; nothing to check."
            echo "touched_red_zone=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for f in $CHANGED; do
            # Skip deleted files (no path to check)
            [ -f "$f" ] || continue
            if ! ./tools/check-blast-radius.sh "$f"; then
              echo "::warning file=$f::Red zone file touched without approval token (CI-side)"
              TOUCHED="true"
            fi
          done

          echo "touched_red_zone=$TOUCHED" >> "$GITHUB_OUTPUT"

          if [ "$TOUCHED" = "true" ]; then
            echo "::group::Red zone files detected"
            echo "One or more changed files are in Tier 0 / Tier 1 Red zone."
            echo "This PR requires the 'manager-approved' label (the MANAGER's sign-off)."
            echo "::endgroup::"
          fi

      - name: Require MANAGER approval label
        if: steps.detect.outputs.touched_red_zone == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map((l) => l.name)
            if (!labels.includes('manager-approved')) {
              core.setFailed(
                "Red zone PR requires the 'manager-approved' label — the MANAGER's explicit sign-off. " +
                "The PR's tier:N label already records severity; this label records that the MANAGER approved it. " +
                'See https://github.com/piyushgupta27/ai-sdlc/blob/main/HITL.md'
              )
            } else {
              core.info('Red zone approved via the `manager-approved` label.')
            }
