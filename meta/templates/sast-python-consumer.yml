name: sast

# Scaffolded by `sdlc onboard` — do not hand-edit the reusable workflow reference.
# To upgrade to a new platform version, run `sdlc onboard --refresh-sast` (planned).
#
# This workflow calls the platform-owned CodeQL SAST in ai-sdlc.
# SHA pins stay platform-maintained — repos supply only their language.
#
# One-time setup required in this repo (human):
#   Settings → Branches → Branch protection for main →
#   Required status checks → add: "CodeQL analyze (python)"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  sast:
    uses: piyushgupta27/ai-sdlc/.github/workflows/sast-reusable.yml@main
    with:
      language: python
    permissions:
      actions: read
      contents: read
      security-events: write
